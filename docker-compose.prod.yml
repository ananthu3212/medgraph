version: '3.8'

services:
  backend:
    image: ghcr.io/ananthu3212/medgraph/backend:latest
    ports:
      - "8081:8080"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE}
      - SPRING_PROFILES_ACTIVE=production
    networks:
      - medgraph-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/ananthu3212/medgraph/frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8080
    networks:
      - medgraph-network
    restart: unless-stopped

networks:
  medgraph-network:
    driver: bridge
